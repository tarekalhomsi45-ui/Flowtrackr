<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | No Phone Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo-area"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Tasks</a>
            <a href="challenge.html" class="nav-item active"><i class="fa-solid fa-mobile-screen"></i> Challenge</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>
    <main>
        <div class="header-row">
            <div>
                <h2>No Phone Challenge</h2>
                <p style="color:var(--text-dim)">Put your phone away and focus.</p>
            </div>
        </div>
        <div class="empty-state" style="margin-top: 50px;">
            <div class="empty-icon" style="background: #1a1a2e; color: #9d7cff; width: 120px; height: 120px;">
                <i class="fa-solid fa-mobile-screen-button" style="font-size: 3rem;"></i>
            </div>
            <h3 style="margin-bottom: 10px;">Ready to focus?</h3>
            <p style="color:var(--text-dim); margin-bottom: 2rem;">Start the timer and keep your phone face down.</p>
            <button class="auth-btn" style="width: 200px;">Start Challenge</button>
        </div>
    </main>
</body>
</html>
